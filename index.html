<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Tracing Web App</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: -apple-system, sans-serif;
        }
        /* The Live Camera Feed */
        #cameraFeed {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* The Image to Trace */
        #tracingImage {
            width: 80vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0.5; /* Starting transparency */
            pointer-events: none; /* Lets you tap through it */
        }
        /* The Controls at the bottom */
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
            width: 80%;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <video id="cameraFeed" autoplay playsinline></video>

    <img id="tracingImage" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a7/React-icon.svg/512px-React-icon.svg.png" alt="Trace me">

    <div id="controls">
        <label for="opacitySlider">Image Visibility</label>
        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.5">
    </div>

    <script>
        // 1. Hook up the slider to the image transparency
        const slider = document.getElementById('opacitySlider');
        const image = document.getElementById('tracingImage');
        
        slider.addEventListener('input', function() {
            image.style.opacity = this.value;
        });

        // 2. Request permission and turn on the iPhone's rear camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" } // Forces the back camera
                });
                const videoElement = document.getElementById('cameraFeed');
                videoElement.srcObject = stream;
            } catch (err) {
                alert("Camera access is required to use this app. Please refresh and allow permissions.");
                console.error(err);
            }
        }

        startCamera();
    </script>
</body>
</html>
