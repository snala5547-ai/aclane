<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Tracing Web App</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            font-family: -apple-system, sans-serif;
        }
        #cameraFeed {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #tracingImage {
            width: 80vw;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0.5;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            color: white;
            text-align: center;
            width: 80%;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
            margin-bottom: 15px;
        }
        /* New Button Styles */
        input[type="file"] {
            display: none;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 20px;
            background-color: #8b5cf6;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <video id="cameraFeed" autoplay playsinline></video>
    
    <!-- This starts blank until you upload a photo -->
    <img id="tracingImage" src="" alt="">

    <div id="controls">
        <!-- New Upload Button -->
        <label class="upload-btn">
            Choose Picture from Phone
            <input type="file" id="imageUploader" accept="image/*">
        </label>
        
        <br>
        
        <label for="opacitySlider">Image Visibility</label>
        <input type="range" id="opacitySlider" min="0.1" max="1" step="0.05" value="0.5">
    </div>

    <script>
        const slider = document.getElementById('opacitySlider');
        const image = document.getElementById('tracingImage');
        const uploader = document.getElementById('imageUploader');

        // 1. When you pick a photo, put it on the screen
        uploader.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    image.src = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // 2. Slider controls transparency
        slider.addEventListener('input', function() {
            image.style.opacity = this.value;
        });

        // 3. Start the camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" }
                });
                document.getElementById('cameraFeed').srcObject = stream;
            } catch (err) {
                alert("Camera access is required.");
            }
        }

        startCamera();
    </script>
</body>
</html>
